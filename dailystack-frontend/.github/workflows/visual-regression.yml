name: Visual Regression + Contrast

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm ci
        working-directory: dailystack-frontend
      - name: Build
        run: npm run build
        working-directory: dailystack-frontend
      - name: Start preview
        run: npm run preview &
        working-directory: dailystack-frontend
      - name: Wait for server
        run: npx wait-on http://localhost:4173 || npx wait-on http://127.0.0.1:4173
      - name: Run Playwright tests
        run: npx playwright test --project=chromium
        working-directory: dailystack-frontend
      - name: Run contrast check
        run: node ./scripts/check-contrast.mjs
        working-directory: dailystack-frontend
      - name: Guard: primary token used as surface
        run: node ./scripts/check-primary-surface-usage.mjs
        working-directory: dailystack-frontend
