<?xml version="1.0" encoding="UTF-8"?>
<svg width="375" height="812" viewBox="0 0 375 812" xmlns="http://www.w3.org/2000/svg">
  <rect width="375" height="812" fill="#161821"/>
  <!-- Stepper -->
  <g opacity="0.95">
    <rect x="16" y="24" rx="6" width="343" height="8" fill="#2D313E" />
    <rect x="16" y="24" rx="6" width="86" height="8" fill="#C7FF2E" />
  </g>
  <!-- Hero title -->
  <text x="36" y="84" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="20" font-weight="700">Welcome to PicksWise</text>
  <text x="36" y="108" fill="#9CA3AF" font-family="Inter, sans-serif" font-size="12">Understand where money goes and start healthy habits</text>
  <!-- Main Card -->
  <rect x="16" y="140" width="343" height="360" rx="16" fill="#1A1D26" />
  <text x="36" y="172" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="14" font-weight="600">Which of these are your goals?</text>
  <!-- Goal chips -->
  <g>
    <rect x="36" y="196" rx="16" width="152" height="36" fill="#232733" />
    <text x="56" y="221" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="13">Build Emergency Fund</text>
    <rect x="36" y="244" rx="16" width="152" height="36" fill="#232733" />
    <text x="56" y="269" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="13">Reduce Impulse Spend</text>
    <rect x="196" y="196" rx="16" width="152" height="36" fill="#232733" />
    <text x="216" y="221" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="13">Save for Travel</text>
  </g>
  <!-- Income input -->
  <text x="36" y="308" fill="#9CA3AF" font-family="Inter, sans-serif" font-size="12">Monthly income</text>
  <rect x="36" y="322" width="303" height="46" rx="10" fill="#0F1724"/>
  <text x="48" y="352" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="18">฿ 45,000</text>
  <!-- Category suggestions -->
  <text x="36" y="386" fill="#9CA3AF" font-family="Inter, sans-serif" font-size="12">Suggested categories</text>
  <g>
    <rect x="36" y="402" rx="12" width="100" height="36" fill="#232733" />
    <rect x="140" y="402" rx="12" width="100" height="36" fill="#232733" />
    <rect x="244" y="402" rx="12" width="100" height="36" fill="#232733" />
  </g>
  <!-- Footer CTA -->
  <rect x="16" y="736" width="343" height="56" rx="14" fill="#C7FF2E" />
  <text x="186" y="768" fill="#000000" font-family="Inter, sans-serif" font-size="16" font-weight="700" text-anchor="middle">Continue</text>
</svg>
