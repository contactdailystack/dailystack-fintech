  <text x="205" y="792" fill="#9CA3AF" font-family="Inter, sans-serif" font-size="12">Insights</text>
  <text x="280" y="792" fill="#9CA3AF" font-family="Inter, sans-serif" font-size="12">AI Coach</text>
  <text x="340" y="792" fill="#9CA3AF" font-family="Inter, sans-serif" font-size="12">Profile</text>
