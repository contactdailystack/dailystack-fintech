  <circle cx="324" cy="28" r="16" fill="#232733" />
  <!-- Balance Card -->
  <rect x="16" y="72" width="343" height="220" rx="16" fill="#1A1D26" />
  <text x="36" y="110" fill="#9CA3AF" font-family="Inter, sans-serif" font-size="12">Total balance</text>
  <text x="36" y="142" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="28" font-weight="700">฿ 214,523.12</text>
  <g>
    <rect x="36" y="174" width="140" height="10" rx="6" fill="#2D313E" />
    <rect x="36" y="188" width="120" height="10" rx="6" fill="#C7FF2E" />
