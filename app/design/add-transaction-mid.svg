<?xml version="1.0" encoding="UTF-8"?>
<svg width="375" height="672" viewBox="0 0 375 672" xmlns="http://www.w3.org/2000/svg">
  <rect width="375" height="672" fill="#161821" />
  <!-- Bottom sheet background -->
  <rect x="0" y="220" width="375" height="452" rx="20" fill="#1A1D26" />
  <!-- Drag handle & header -->
  <rect x="158" y="236" width="58" height="6" rx="3" fill="#2D313E" />
  <text x="36" y="268" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="16" font-weight="600">Add Transaction</text>
  <!-- Amount display -->
  <text x="36" y="308" fill="#9CA3AF" font-family="Inter, sans-serif" font-size="12">Amount</text>
  <text x="36" y="342" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="34" font-weight="700">฿ 1,250</text>
  <!-- Category selector (scroll) -->
  <g>
    <rect x="16" y="372" width="343" height="56" rx="12" fill="#232733" />
    <text x="36" y="406" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="13">Groceries · Last used</text>
  </g>
  <!-- Note input -->
  <text x="36" y="438" fill="#9CA3AF" font-family="Inter, sans-serif" font-size="12">Note</text>
  <rect x="36" y="452" width="303" height="40" rx="8" fill="#0F1724" />
  <text x="48" y="480" fill="#9CA3AF" font-family="Inter, sans-serif" font-size="12">Tap to add note or merchant</text>
  <!-- Controls row -->
  <rect x="36" y="506" width="120" height="36" rx="8" fill="#232733" />
  <text x="52" y="530" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="12">Today</text>
  <rect x="164" y="506" width="120" height="36" rx="8" fill="#232733" />
  <text x="190" y="530" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="12">Mood</text>
  <!-- Keypad hint -->
  <rect x="18" y="548" width="339" height="88" rx="12" fill="#12141C" />
  <text x="36" y="580" fill="#9CA3AF" font-family="Inter, sans-serif" font-size="12">Numeric keypad (large touch targets)</text>
  <!-- Save CTA -->
  <rect x="16" y="648" width="343" height="56" rx="14" fill="#C7FF2E" />
  <text x="186" y="684" fill="#000000" font-family="Inter, sans-serif" font-size="16" font-weight="700" text-anchor="middle">Save Expense</text>
</svg>
