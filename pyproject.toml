[tool.ruff]
# Target Python version
target-version = "py310"

# Enable pycodestyle (E), Pyflakes (F), and isort (I) rules by default
select = ["E", "F", "I", "W", "UP", "N"]
ignore = []

# Line length matching common formatting standards
line-length = 88

[tool.ruff.format]
# Enable auto-formatting (like black)
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
